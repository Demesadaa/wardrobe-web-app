spring.application.name=wardrobe-backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/wardrobe
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload-dir=uploads
app.frontend-origins=${FRONTEND_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://wardrobe-web-app.vercel.app,https://*.vercel.app}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
