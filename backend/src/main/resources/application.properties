spring.application.name=wardrobe-backend
spring.profiles.default=dev
server.port=${PORT:8080}

spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload-dir=uploads
app.frontend-origins=${FRONTEND_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://wardrobe-web-app.vercel.app,https://*.vercel.app}
app.settings.title=Wardrobe API
app.settings.default-page-limit=20
app.settings.support-email=support@wardrobe.local
app.settings.external-style-service-url=http://localhost:8090/style
app.settings.ai-suggestions-enabled=true

server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

spring.messages.basename=messages
spring.messages.encoding=UTF-8

logging.file.name=logs/app.log
logging.logback.rollingpolicy.file-name-pattern=logs/app-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
