spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/wardrobe}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:wardrobe}
spring.datasource.password=${DATABASE_PASSWORD:change-me}

spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false

app.settings.title=${APP_TITLE:Wardrobe API}
app.settings.default-page-limit=${APP_DEFAULT_PAGE_LIMIT:50}
app.settings.support-email=${APP_SUPPORT_EMAIL:support@wardrobe.example}
app.settings.external-style-service-url=${STYLE_SERVICE_URL:https://style-api.example.com}
app.settings.ai-suggestions-enabled=${AI_SUGGESTIONS_ENABLED:false}

server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:none}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}

logging.level.root=WARN
logging.level.com.wardrobe=INFO
