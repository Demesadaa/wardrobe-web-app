spring.datasource.url=jdbc:h2:mem:wardrobe-dev
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

app.settings.title=Wardrobe API - Development
app.settings.default-page-limit=10
app.settings.support-email=dev-support@wardrobe.local
app.settings.external-style-service-url=http://localhost:8090/dev-style
app.settings.ai-suggestions-enabled=true

logging.level.root=INFO
logging.level.com.wardrobe=DEBUG
